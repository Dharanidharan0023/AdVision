services:
  # The Node.js Backend Service
  - type: web
    name: advision-backend
    env: node
    rootDir: backend-node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    
    # Environment Variables
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: advision-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "" # Fill this out in the Render dashboard after Vercel deployment
        
    # Persistent Disk for uploaded APK files
    disk:
      name: uploads-disk
      mountPath: /opt/render/project/src/backend-node/public/uploads
      sizeGB: 1

  # The PostgreSQL Database
  - type: pgr
    name: advision-db
    plan: free # Change to a paid plan if needed for production
    databaseName: advision
    user: admin
